<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de setup - Next Fret</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Topo compacto usado nas telas internas do aluno. -->
  <nav class="navbar navbar--compact">
    <a class="logo" href="dashboard.html" aria-label="Resumo do painel Next Fret">
      <img src="logoguitarra.png" alt="Logo Next Fret">
      <span>Next Fret</span>
    </a>

    <div class="nav-links" aria-label="Links principais do painel">
      <a href="sobre.html">Sobre nós</a>
      <a href="aulas.html">Aulas</a>
      <a class="active" href="setup.html">Equipamentos</a>
    </div>
  </nav>

  <!-- Tela de setup: calculadora visual pronta para receber JavaScript depois. -->
  <div class="dashboard-container setup-layout">
    <aside class="sidebar">
      <nav class="menu-lateral" aria-label="Menu lateral">
        <a href="dashboard.html">Resumo</a>
        <a href="aulas.html">Aulas</a>
        <a href="musicas.html">Músicas</a>
        <a href="materiais.html">Materiais</a>
        <a class="active" href="setup.html">Setup</a>
        <a href="index.html">Sair</a>

        <div class="user-chip" aria-label="Usuário logado">
          <span class="user-avatar" aria-hidden="true">D</span>
          <span>Daniel</span>
        </div>
      </nav>
    </aside>

    <main class="content">
      <h1>Calculadora de setup</h1>

      <section class="setup-grid" aria-label="Calculadora de setup">
        <!-- Formulario da calculadora. Por enquanto o botao nao executa calculo. -->
        <form class="setup-box">
          <label for="produto">Nome do produto</label>
          <input id="produto" name="produto" type="text" placeholder="Ex: Stratocaster">

          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo">
            <option value="guitarra">Guitarra</option>
            <option value="amplificador">Amplificador</option>
            <option value="pedaleira">Pedaleira</option>
            <option value="acessorio">Acessório</option>
          </select>

          <label for="preco">Preço</label>
          <input id="preco" name="preco" type="number" min="0" step="0.01" placeholder="R$ 0,00">

          <label for="orcamento">Orçamento disponível</label>
          <input id="orcamento" name="orcamento" type="number" min="0" step="0.01" placeholder="R$ 0,00">

          <button class="btn-primary" type="button">Adicionar item</button>
        </form>

        <!-- Resumo estatico da calculadora, sem JavaScript ainda. -->
        <aside class="setup-summary" aria-label="Resumo do setup">
          <h2>Resumo do setup</h2>

          <div class="setup-total">
            <span>Total estimado</span>
            <strong>R$ 0,00</strong>
          </div>

          <div class="setup-list">
            <div class="setup-list-item">
              <span>Guitarra</span>
              <strong>R$ 0,00</strong>
            </div>

            <div class="setup-list-item">
              <span>Amplificador</span>
              <strong>R$ 0,00</strong>
            </div>

            <div class="setup-list-item">
              <span>Pedais e acessórios</span>
              <strong>R$ 0,00</strong>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </div>
</body>

</html>
