<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Next Fret</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Topo simples usado antes do usuario entrar no painel. -->
  <nav class="navbar">
    <a class="logo" href="index.html" aria-label="Página inicial do Next Fret">
      <img src="logoguitarra.png" alt="Logo Next Fret">
      <span>Next Fret</span>
    </a>

    <div class="nav-links" aria-label="Links de acesso">
      <a href="login.html">Login</a>
      <a class="active" href="cadastro.html">Cadastre-se</a>
    </div>
  </nav>

  <!-- Area central do formulario de cadastro. -->
  <main class="auth">
    <form class="auth-box" action="dashboard.html">
      <h1>Cadastro</h1>

      <label for="nome">Nome</label>
      <input id="nome" name="nome" type="text" placeholder="Digite seu nome">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="Digite seu email">

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" placeholder="Digite sua senha">

      <button class="btn-primary" type="submit">Cadastrar</button>

      <p class="login-link">
        Já possui uma conta? <a href="login.html">Fazer login</a>
      </p>
    </form>
  </main>
</body>

</html>
