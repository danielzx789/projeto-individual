<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Next Fret</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar">
<a class="logo" href="index.html">
<span class="logo-image"></span>
<span class="logo-text">Next Fret</span>
</a>

<div class="navbar-links">
<a class="active" href="login.html">Login</a>
<a href="cadastro.html">Cadastre-se</a>
</div>
</nav>

<main class="auth">
<form class="auth-box" onsubmit="return entrar()">
<h1>Login</h1>

<label for="email_input">Email</label>
<input id="email_input" type="email" placeholder="Digite seu email">

<label for="senha_input">Senha</label>
<input id="senha_input" type="password" placeholder="Digite sua senha">

<p id="mensagem_erro" class="login-link"></p>

<button class="btn-primary" type="submit">Entrar</button>

<p class="login-link">
Não tem conta? <a href="cadastro.html">Cadastre-se</a>
</p>
</form>
</main>
</body>
</html>

<script>
function entrar() {
var emailVar = email_input.value;
var senhaVar = senha_input.value;

if (emailVar == "" || senhaVar == "") {
mensagem_erro.innerHTML = "Preencha todos os campos.";
return false;
}

fetch("/usuarios/autenticar", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
emailServer: emailVar,
senhaServer: senhaVar
})
}).then(function (resposta) {
console.log("resposta: ", resposta);

if (resposta.ok) {
resposta.json().then(function (json) {
console.log(json);

sessionStorage.EMAIL_USUARIO = json.email;
sessionStorage.NOME_USUARIO = json.nome;
sessionStorage.ID_USUARIO = json.id;

window.location = "dashboard.html";
});
} else {
resposta.text().then(function (texto) {
mensagem_erro.innerHTML = texto;
});
}
}).catch(function (erro) {
console.log("#ERRO: ", erro);
mensagem_erro.innerHTML = "Houve um erro ao tentar realizar o login.";
});

return false;
}
</script>
