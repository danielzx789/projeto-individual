<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup - Next Fret</title>
<link rel="stylesheet" href="style.css">
<script src="js/sessao.js"></script>
</head>

<body onload="validarSessao(); listar()">
<nav class="navbar navbar--mini">
<a class="logo" href="dashboard.html">
<span class="logo-image"></span>
<span class="logo-text">Next Fret</span>
</a>

<div class="navbar-links">
<a href="sobre.html">Sobre nós</a>
<a href="aulas.html">Aulas</a>
<a class="active" href="setup.html">Equipamentos</a>
</div>
</nav>

<div class="dashboard-container calculator-layout">
<aside class="sidebar">
<nav class="menu-lateral">
<a href="dashboard.html">Resumo</a>
<a href="aulas.html">Aulas</a>
<a href="musicas.html">Músicas</a>
<a href="materiais.html">Materiais</a>
<a class="active" href="setup.html">Setup</a>
<a href="#" onclick="limparSessao()">Sair</a>

<div class="user-block">
<span class="user-avatar">D</span>
<span id="b_usuario">Daniel</span>
</div>
</nav>
</aside>

<main class="content">
<h1>Calculadora de Setup</h1>

<section class="calculator-grid">
<section class="calculator-card">
<h2>Novo item</h2>

<div class="calculator-form-group">
<p>Nome do produto</p>
<input type="text" id="ipt_nome">
</div>

<div class="calculator-form-group">
<p>Tipo</p>
<select id="ipt_tipo">
<option value="Guitarra">Guitarra</option>
<option value="Amplificador">Amplificador</option>
<option value="Pedaleira">Pedaleira</option>
<option value="Acessório">Acessório</option>
</select>
</div>

<div class="calculator-form-group">
<p>Preço</p>
<input type="number" id="ipt_preco" step="0.01">
</div>

<button class="btn-primary" onclick="salvar()">Salvar</button>
</section>

<section class="calculator-card">
<h2>Seu setup</h2>
<div id="msg" class="calculator-items"></div>
</section>
</section>
</main>
</div>

<script>
function salvar() {
var idUsuario = sessionStorage.ID_USUARIO;
var nome = ipt_nome.value;
var tipo = ipt_tipo.value;
var preco = Number(ipt_preco.value);

if (idUsuario == undefined) {
alert("Usuário não encontrado. Faça login novamente.");
window.location = "login.html";
return;
}

if (nome == "" || preco <= 0) {
alert("Preencha corretamente!");
return;
}

var tipoServico = tipo + " - " + nome;

fetch("/orcamentos/cadastrar", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
idUsuario: idUsuario,
tipoServico: tipoServico,
valorEstimado: preco
})
})
.then(function (resposta) {
if (resposta.ok) {
limparCampos();
listar();
} else {
resposta.text().then(function (texto) {
alert("Erro ao cadastrar item no setup: " + texto);
});
}
})
.catch(function (erro) {
console.log("Erro ao cadastrar orçamento: " + erro);
});
}

function listar() {
var idUsuario = sessionStorage.ID_USUARIO;

if (idUsuario == undefined) {
return;
}

fetch(`/orcamentos/listar/${idUsuario}`)
.then(function (resposta) {
if (resposta.ok) {
resposta.json().then(function (lista) {
exibirSetup(lista);
});
} else {
resposta.text().then(function (texto) {
console.log("Erro ao listar orçamentos: " + texto);
});
}
})
.catch(function (erro) {
console.log("Erro ao listar setup: " + erro);
});
}

function remover(idOrcamento) {
var idUsuario = sessionStorage.ID_USUARIO;

if (idUsuario == undefined) {
alert("Usuário não encontrado. Faça login novamente.");
window.location = "login.html";
return;
}

if (idOrcamento == undefined) {
alert("Não foi possível identificar o item para remover.");
return;
}


fetch(`/orcamentos/remover/${idOrcamento}/${idUsuario}`, {
method: "POST"
})
.then(function (resposta) {
if (resposta.ok) {
listar();
} else {
resposta.text().then(function (texto) {
alert("Erro ao remover item: " + texto);
});
}
})
.catch(function (erro) {
console.log("Erro ao remover item: " + erro);
});
}

function exibirSetup(lista) {
msg.innerHTML = "";

var total = 0;
var temGuitarra = false;
var temAmplificador = false;
var temPedaleira = false;
var temAcessorio = false;

if (lista.length == 0) {
msg.innerHTML = "<p>Nenhum item cadastrado.</p>";
return;
}

for (var i = 0; i < lista.length; i++) {
var item = lista[i];
var idOrcamento = item.id;
var valor = Number(item.valor_estimado);
var tipoServico = item.tipo_servico;

total += valor;

if (tipoServico.indexOf("Guitarra") >= 0 || tipoServico.indexOf("guitarra") >= 0) {
temGuitarra = true;
}

if (tipoServico.indexOf("Amplificador") >= 0 || tipoServico.indexOf("amp") >= 0) {
temAmplificador = true;
}

if (tipoServico.indexOf("Pedaleira") >= 0 || tipoServico.indexOf("pedaleira") >= 0) {
temPedaleira = true;
}

if (tipoServico.indexOf("Acessório") >= 0 || tipoServico.indexOf("acessorio") >= 0) {
temAcessorio = true;
}

msg.innerHTML += `
<div class="calculator-item">
<div class="calculator-item-info">
<strong>${item.tipo_servico}</strong>
<p>R$ ${valor.toFixed(2)}</p>
</div>

<button class="btn-remover" onclick="remover(${idOrcamento})">
Remover
</button>
</div>
`;
}

var porcentagemDesconto = 0;

if (temGuitarra && temAmplificador && temPedaleira && temAcessorio) {
porcentagemDesconto = 25;
} else if (temGuitarra && temAmplificador) {
porcentagemDesconto = 10;
}

var valorDesconto = total * (porcentagemDesconto / 100);
var totalFinal = total - valorDesconto;

msg.innerHTML += `
<div class="calculator-total">
<span>Subtotal</span>
<strong>R$ ${total.toFixed(2)}</strong>
</div>

<div class="calculator-total">
<span>Desconto aplicado (${porcentagemDesconto}%)</span>
<strong>R$ ${valorDesconto.toFixed(2)}</strong>
</div>

<div class="calculator-total">
<span>Total final</span>
<strong>R$ ${totalFinal.toFixed(2)}</strong>
</div>
`;
}

function limparCampos() {
ipt_nome.value = "";
ipt_preco.value = "";
ipt_tipo.value = "Guitarra";
}
</script>
</body>
</html>
